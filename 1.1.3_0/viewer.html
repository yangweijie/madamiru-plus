<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NexVid - Local Video Viewer</title><link rel="stylesheet" href="viewer.css"><script defer="defer" src="viewer.js"></script></head><body><div class="viewer-container"><div class="video-wrapper"><video id="localVideo" data-upscaler-id="local-viewer-video"></video><div class="no-video-message"><div class="icon"><img src="icons/icon128.png" alt="NexVid Icon"/></div><h2>No video loaded</h2><p>Select a video from the popup or drag & drop a file here</p></div><div class="video-controls" id="videoControls" style="display: none;"><div class="progress-bar" id="progressBar"><div class="progress-filled" id="progressFilled"></div></div><div class="controls-bottom"><button class="control-btn" id="playPauseBtn" title="Play/Pause"><span class="icon">▶️</span></button> <span class="time-display" id="timeDisplay">0:00 / 0:00</span><div class="volume-control"><button class="control-btn" id="muteBtn" title="Mute/Unmute"><span class="icon">🔊</span></button> <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100"></div><button class="control-btn" id="fullscreenBtn" title="Fullscreen"><span class="icon">⛶</span></button></div></div></div><div class="controls-panel"><div class="panel-header"><h3>🎨 Video Effects</h3><button id="togglePanel" class="toggle-btn">▼</button></div><div class="panel-content"><div class="status-bar"><span class="status-label">Upscaling:</span> <span id="upscalingStatus" class="status-value">Disabled</span></div><div class="video-info" id="videoInfo" style="display: none;"><p class="info-label">📹 <span id="videoName"></span></p><p class="info-details"><span id="videoDetails"></span></p></div><div class="info-message">Effects are controlled from the extension popup. Open the popup to adjust filters, shaders, and upscaling settings.</div><button id="openPopup" class="open-popup-btn">⚙️ Open Extension Settings</button> <button id="changeVideo" class="change-video-btn" style="display: none;">📁 Change Video</button></div></div><div class="drop-zone" id="dropZone"><div class="drop-content"><div class="drop-icon">📁</div><p class="drop-text">Drop video file here</p><p class="drop-hint">or click to browse</p></div></div></div></body></html>
